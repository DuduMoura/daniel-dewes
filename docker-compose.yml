services:
  db:
    image: postgres:16-alpine
    container_name: wms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wms}
      POSTGRES_DB: ${POSTGRES_DB:-wms}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms} -d ${POSTGRES_DB:-wms}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wms_pgdata:
